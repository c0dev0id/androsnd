name: Build

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Run lint
        run: ./gradlew lint

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        run: |
          echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > "${{ runner.temp }}/release.keystore"

      - name: Build signed release APK
        env:
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          ./gradlew assembleRelease -PappVersionName="dev-${SHORT_SHA}"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

  draft-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download signed APK
        uses: actions/download-artifact@v4.1.3
        with:
          name: app-release

      - name: Rename APK
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          mv app-release.apk "androsnd-dev-${SHORT_SHA}.apk"
          echo "apk_name=androsnd-dev-${SHORT_SHA}.apk" >> "$GITHUB_ENV"

      - name: Delete existing dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete dev --yes 2>/dev/null || true

      - name: Create pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev
          name: Development Build
          body: |
            Automated development build from commit ${{ github.sha }} on ${{ github.ref_name }}.

            This is a pre-release snapshot — not intended for production use.
          draft: false
          prerelease: true
          make_latest: false
          files: ${{ env.apk_name }}
